backend:
  name: github
  repo: jannepeltola/suomisiirtyy.fi
media_folder: "static/images/uploads"
public_folder: "/images/uploads"
collections:
  - name: "uutinen" # Used in routes, e.g., /admin/collections/blog
    label: "Uutiset" # Used in the UI
    folder: "content/posts/uutinen" # The path to the folder where the documents are stored
    create: true # Allow users to create new documents in this collection
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}" # Filename template, e.g., YYYY-MM-DD-title.md
    fields: # The fields for each document, usually in front matter
      - { label: "Layout", name: "layout", widget: "hidden", default: "uutinen" }
      - { label: "Otsikko", name: "title", widget: "string" }
      - { label: "Päivämäärä", name: "date", widget: "datetime" }
      - { label: "Kuva", name: "thumbnail", widget: "image" }
      - { label: "Teksti", name: "body", widget: "markdown" }
  - name: "vaihtoehto" # Used in routes, e.g., /admin/collections/blog
    label: "Vaihtoehto" # Used in the UI
    folder: "content/vaihtoehdot" # The path to the folder where the documents are stored
    create: true # Allow users to create new documents in this collection
    slug: "{{slug}}" # Filename template, e.g., YYYY-MM-DD-title.md
    fields: # The fields for each document, usually in front matter
      - { label: "Layout", name: "layout", widget: "hidden", default: "vaihtoehto" }
      - { label: "Nimi", name: "name", widget: "string" }
      - { label: "Linkki", name: "link", widget: "string" }
      - { label: "Kuvaus", name: "body", widget: "markdown" }
      
