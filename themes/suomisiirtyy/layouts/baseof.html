<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
    <head>
	{{ partial "head.html" . }}
    </head>
    <body class="flex flex-col min-h-screen justify-center items-center p-20">
    <div class="flex flex-col justify-center items-center min-w-80">
	<header class="flex-shrink-0">
	    {{ partial "header.html" . }}
	</header>
	<main class="">
	    {{ block "main" . }}{{ end }}
	</main> 
	<footer class="">
	    {{ partial "footer.html" . }}
	</footer>
    </div>
</body>
</html>
